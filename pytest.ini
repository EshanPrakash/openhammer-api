[pytest]
testpaths = tests
filterwarnings =
    # Known, tracked pre-existing deprecations (not this suite's problem to fix) - matched by
    # message so any OTHER future deprecation from these libraries still surfaces normally.
    ignore:(?s).*on_event is deprecated.*:DeprecationWarning
    ignore:(?s).*Support for class-based .config. is deprecated.*:DeprecationWarning
    ignore:(?s).*The .app. shortcut is now deprecated.*:DeprecationWarning
    ignore:(?s).*The .dict. method is deprecated.*:DeprecationWarning
