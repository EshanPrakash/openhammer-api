[pytest]
testpaths = tests_mcp
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    # Same pre-existing, tracked deprecation pytest.ini ignores - api/models.py's Unit
    # class uses pydantic's class-based Config, which this suite also imports.
    ignore:(?s).*Support for class-based .config. is deprecated.*:DeprecationWarning
